apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - sealed-secrets/rsa-keys.yaml

# Namespace applied to all resources in this overlay.
# Format: <service-namespace>-<environment>
namespace: ride-hailing-dev

# Image tag is updated here by Jenkins CI after each successful build.
images:
  - name: docker.io/ama2352/dispatch-service
    newTag: "46-2786a3f6"

commonLabels:
  environment: dev
  # Enables Istio sidecar injection for all pods in this overlay.
  istio-injection: enabled
