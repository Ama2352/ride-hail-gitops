# =============================================================================
# Dispatch Service Deployment & Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
  labels:
    app: dispatch-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: dispatch-service
          image: docker.io/ama2352/dispatch-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          
          env:
            - name: PORT
              value: "8080"
            - name: SERVICE_NAME
              value: "dispatch-service"
            - name: VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['version']
          
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: dispatch-service
  labels:
    app: dispatch-service
spec:
  type: ClusterIP
  selector:
    app: dispatch-service
  ports:
    - name: http
      port: 80
      targetPort: http
