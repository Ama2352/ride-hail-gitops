# =============================================================================
# Dispatch Service - Istio VirtualService
# Routes traffic from gateway to dispatch service
# =============================================================================
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: dispatch-service
spec:
  hosts:
    - "*"
  gateways:
    - istio-system/ride-hailing-gateway
  http:
    - match:
        - uri:
            prefix: "/dispatch/"
      rewrite:
        uri: "/"  # Rewrite /dispatch/health to /health
      route:
        - destination:
            host: dispatch-service
            port:
              number: 80
---
# =============================================================================
# Dispatch Service - Istio DestinationRule
# Defines traffic policies for the service
# =============================================================================
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dispatch-service
spec:
  host: dispatch-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 2
    outlierDetection:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: v1
      labels:
        version: v1
