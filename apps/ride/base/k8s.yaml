apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ride-service
  template:
    metadata:
      labels:
        app: ride-service
    spec:
      containers:
      - name: ride-service
        image: docker.io/ama2352/ride-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8082
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/rides"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: ride-db-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ride-db-credentials
              key: password
        - name: SPRING_REDIS_HOST
          value: "redis-master.redis.svc.cluster.local"
        - name: SPRING_REDIS_PORT
          value: "6379"
        - name: PORT
          value: "8082"
        startupProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8082
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 256m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ride-service
  namespace: default
  labels:
    app: ride-service
spec:
  selector:
    app: ride-service
  ports:
  - name: http
    port: 8080
    targetPort: http
  type: ClusterIP
