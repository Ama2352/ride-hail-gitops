# Root App of Apps — apply once to bootstrap the platform.
# Renders the Helm chart at platform/argocd (Applications + ApplicationSets).
# - ApplicationSet ride-hail-services: dispatch / notification / user (dev|test|prod)
# - Application sealed-secrets: installs controller in kube-system (sync-wave -3)
# - Other Applications: Istio, Redis, observability, etc.
#
#   kubectl apply -f root-app.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ride-hail-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # repoURL: https://github.com/ama2352/ride-hail-gitops.git
    repoURL: https://gitlab.com/ride-hailing-devsecops/gitops.git
    targetRevision: main
    path: platform/argocd
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
