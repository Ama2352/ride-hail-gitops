# SonarQube Helm values — sonarqube namespace, NodePort 30090.
# Bundled PostgreSQL enabled (H2 is deprecated in SonarQube 10.x).
edition: community

image:
  tag: "10.7.0-community"

# NodePort 30090. Default credentials: admin / admin (change on first login).
service:
  type: NodePort
  nodePort: 30090

resources:
  requests:
    cpu: 500m
    memory: "1024Mi"
  limits:
    cpu: "1"
    memory: "2Gi"

# Persistent volume via local-path-provisioner for SonarQube data directory.
# Preserves analysis history and configuration across pod restarts.
persistence:
  enabled: true
  storageClass: "standard"
  size: 5Gi
  accessModes:
    - ReadWriteOnce

# initSysctl disabled — vm.max_map_count and fs.file-max are set on the nodes
# directly via playbook_worker.yml (/etc/sysctl.d/sonarqube.conf).
initSysctl:
  enabled: false

# mmap disabled for resource-constrained environments.
sonarProperties:
  sonar.search.javaAdditionalOpts: "-Dnode.store.allow_mmap=false"

# Bundled PostgreSQL. Production: use an external managed instance.
postgresql:
  enabled: true
  image:
    repository: bitnami/postgresql
    tag: "latest"
  primary:
    persistence:
      enabled: true
      storageClass: "standard"
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi

# Readiness and startup probes — allow extra time for SonarQube to initialize.
readinessProbe:
  initialDelaySeconds: 60
  failureThreshold: 6
startupProbe:
  initialDelaySeconds: 60
  failureThreshold: 24 # Cho phép chờ lên đến vài phút