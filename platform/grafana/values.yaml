# Grafana Helm values — monitoring namespace, NodePort 30300.
image:
  tag: "10.4.2"

replicas: 1

# local-path volume is already owned by Grafana UID/GID (472:472).
# Disable init chown step to avoid CrashLoopBackOff on some host filesystems.
initChownData:
  enabled: false

# NodePort 30300
service:
  type: NodePort
  nodePort: 30300

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Persistent volume via local-path-provisioner for dashboard/config storage.
persistence:
  enabled: true
  storageClassName: "standard"
  size: 1Gi
  accessModes:
    - ReadWriteOnce

# Anonymous admin access — learning environment only.
grafana.ini:
  auth.anonymous:
    enabled: true
    org_role: Admin
  auth:
    disable_login_form: true
  analytics:
    reporting_enabled: false
    check_for_updates: false
  server:
    root_url: "http://localhost:3000"

# Auto-configures Prometheus as the default datasource on startup.
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local:80
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"

# Dashboard-as-code scaffolding using declarative approach.
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# Pre-import Grafana Dashboard IDs directly via Helm's download-dashboards initContainer
dashboards:
  default:
    # Example 1: Node Exporter Full (Dashboard ID: 1860)
    node-exporter:
      gnetId: 1860
      revision: 33
      datasource: Prometheus
    # Example 2: Go Processes / Application Metrics (Dashboard ID: 10826)
    go-metrics:
      gnetId: 10826
      revision: 1
      datasource: Prometheus

# Alternative Sidecar Pattern: Auto-load custom JSON dashboards from ConfigMaps
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
