# SonarQube Community Edition + PostgreSQL — deployed via official Helm chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarqube
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ride-hail-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://SonarSource.github.io/helm-chart-sonarqube
      chart: sonarqube
      targetRevision: "10.*"
      helm:
        releaseName: sonarqube
        valueFiles:
          - $values/platform/sonarqube/values.yaml

    - repoURL: https://github.com/ama2352/ride-hail-gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: sonarqube

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
