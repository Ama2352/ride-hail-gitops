# ApplicationSet: dispatch, notification, and user services (all envs).
# Replaces per-env Application manifests under templates/dev|test|prod.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ride-hail-services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ride-hail-services
spec:
  generators:
    # Automation trigger: one list item => one ArgoCD Application generated automatically.
    - list:
        elements:
          - appName: dispatch-service-dev
            path: apps/dispatch/overlays/dev
            destNamespace: ride-hailing-dev
          - appName: notification-service-dev
            path: apps/notification/overlays/dev
            destNamespace: ride-hailing-dev
  template:
    metadata:
      name: '{{ "{{appName}}" }}'
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: ride-hail-services
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: "{{ .Values.repoURL }}"
        targetRevision: main
        path: '{{ "{{path}}" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ "{{destNamespace}}" }}'
      syncPolicy:
        # Automation trigger: each generated app is continuously reconciled from Git.
        automated:
          selfHeal: true
          prune: true
        managedNamespaceMetadata:
          labels:
            # Automation trigger: new namespaces get sidecar injection label automatically.
            istio-injection: enabled
        syncOptions:
          # Automation trigger: namespaces are created on-the-fly.
          - CreateNamespace=true
