# Dispatch service — tracks apps/dispatch/overlays/dev.
# Jenkins CI writes a new image tag to the overlay on every build.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dispatch-service-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ride-hail-services
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: main
    path: apps/dispatch/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: ride-hailing-dev

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    managedNamespaceMetadata:
      labels:
        istio-injection: enabled
    syncOptions:
      - CreateNamespace=true
