# Sealed Secrets controller — must run before GitOps-managed SealedSecret resources reconcile.
# After sync, kubeseal can use: --controller-namespace kube-system --controller-name sealed-secrets-controller
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ride-hail-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.*
    helm:
      releaseName: sealed-secrets
      values: |
        # Chart default service name is often "sealed-secrets"; kubeseal defaults to sealed-secrets-controller
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
