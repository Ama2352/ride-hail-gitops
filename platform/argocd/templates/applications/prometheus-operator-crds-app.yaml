# Prometheus Operator CRDs — installs ServiceMonitor/PodMonitor CRDs before Prometheus apps sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crds
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ride-hail-platform
  annotations:
    # Automation trigger: ensure CRDs are created first so later SM/PM manifests are valid.
    argocd.argoproj.io/sync-wave: "-1"  # must exist before ServiceMonitor/PodMonitor resources
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-operator-crds
    targetRevision: "28.*"
    helm:
      releaseName: prometheus-operator-crds

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      # CRDs are large; use server-side apply to avoid oversized last-applied annotations.
      - ServerSideApply=true
