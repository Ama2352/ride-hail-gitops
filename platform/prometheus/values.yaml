# Prometheus Helm values — monitoring namespace, NodePort 30909.
server:
  image:
    tag: "v2.53.0"

  retention: "6h"   # short retention for resource-constrained cluster

  global:
    scrape_interval: 15s
    evaluation_interval: 15s
    external_labels:
      cluster: "ridehailing-local"
      environment: "development"

  # Send firing alerts to in-cluster Alertmanager.
  alertmanagers:
    - static_configs:
        - targets:
            - prometheus-alertmanager.monitoring.svc.cluster.local:9093

  extraArgs:
    web.enable-admin-api: ""       # enable admin API for management

  # NodePort 30909 — ClusterIP port stays at 80 so in-cluster URLs (e.g., Grafana
  # datasource http://prometheus-server.monitoring.svc.cluster.local:80) work.
  service:
    type: NodePort
    nodePort: 30909
    servicePort: 80

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Persistent volume via local-path-provisioner. Prevents WAL corruption on
  # restart and stops the crash-loop that was causing 502 timeouts from Grafana.
  persistentVolume:
    enabled: true
    storageClass: "standard"
    size: 5Gi
    accessModes:
      - ReadWriteOnce

# Node Exporter — DaemonSet covers all nodes including master (standard for observability agents).
prometheus-node-exporter:
  hostNetwork: true
  hostRootFsMount:
    enabled: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  # Tolerate master taint so the DaemonSet covers all nodes.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule

alertmanager:
  enabled: true

  # Keep Alertmanager lightweight for small local clusters.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 192Mi

  persistentVolume:
    enabled: true
    storageClass: "standard"
    size: 1Gi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "https://hooks.slack.com/services/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"
    route:
      receiver: default-receiver
      group_by:
        - alertname
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
      # routes:
      #   # Fast path for manual notification testing.
      #   - receiver: default-receiver
      #     matchers:
      #       - alertname="SlackNotificationTest"
      #     group_wait: 5s
      #     group_interval: 30s
      #     repeat_interval: 1m
    receivers:
      - name: default-receiver
        slack_configs:
          - channel: "#all-ridehailing"
            send_resolved: true
            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'
            pretext: "RideHailing monitoring alert"
            mrkdwn_in:
              - pretext
              - text
            text: |-
              *Status:* {{ .Status | toUpper }}
              *Severity:* {{ if .CommonLabels.severity }}{{ .CommonLabels.severity }}{{ else }}n/a{{ end }}
              *Environment:* {{ if .CommonLabels.environment }}{{ .CommonLabels.environment }}{{ else }}development{{ end }}
              *Namespace:* {{ if .CommonLabels.namespace }}{{ .CommonLabels.namespace }}{{ else }}n/a{{ end }}
              *Grafana:* http://localhost:30300/alerting/list

              {{ range .Alerts -}}
              *Summary:* {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}n/a{{ end }}
              *Description:* {{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}n/a{{ end }}
              *Instance:* {{ if .Labels.instance }}{{ .Labels.instance }}{{ else }}n/a{{ end }}
              *Pod:* {{ if .Labels.pod }}{{ .Labels.pod }}{{ else }}n/a{{ end }}
              *Prometheus Source:* {{ if .GeneratorURL }}{{ .GeneratorURL }}{{ else }}n/a{{ end }}
              ---
              {{ end }}
            footer: "Prometheus Alertmanager"

kube-state-metrics:
  enabled: true

# Base alert rules for infra and workload health.
serverFiles:
  alerting_rules.yml:
    groups:
      - name: node-health
        rules:
          - alert: InstanceDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Target {{ $labels.instance }} is down"
              description: "Prometheus target has been unreachable for more than 2 minutes."

          - alert: HighCpuUsage
            expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage is above 85% for 5 minutes."

          - alert: HighMemoryUsage
            expr: ((1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100) > 90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage is above 90% for 5 minutes."

      - name: kubernetes-workload
        rules:
          - alert: PodRestartingFrequently
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarting frequently"
              description: "Container restarted more than 3 times in the last 15 minutes."

      # - name: notification-test
      #   rules:
      #     # Test alert for Slack pipeline verification. Remove or disable after validation.
      #     - alert: SlackNotificationTest
      #       expr: vector(1)
      #       for: 15s
      #       labels:
      #         severity: info
      #         namespace: monitoring
      #         environment: development
      #       annotations:
      #         summary: "Slack notification test alert"
      #         description: "This is a manual test alert to verify Alertmanager -> Slack delivery."

# Custom scrape targets — Jenkins, Istio envoy sidecars, Istio control plane.
extraScrapeConfigs: |

  - job_name: 'envoy-stats'
    metrics_path: /stats/prometheus
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: '.*-envoy-prom'
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app

  - job_name: 'istio-control-plane'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - istio-system
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: istiod;http-monitoring
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
