apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-sidecars
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  selector: {}
  podMetricsEndpoints:
    - targetPort: 15090
      path: /stats/prometheus
      interval: 15s
      scheme: http
  namespaceSelector:
    matchNames:
      - ride-hailing-dev
      - ride-hailing-test
      - ride-hailing-prod
