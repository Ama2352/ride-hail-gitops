# Istio Gateway — entry point for external traffic into the service mesh.
# Accepts HTTP on port 80 for all hosts (development). Restrict hosts for production.
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: ride-hailing-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
